<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>칸반 보드</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#0f0f0f;
    --surface:#1a1a1a;
    --column:#222;
    --card:#2a2a2a;
    --card-hover:#333;
    --border:#333;
    --text:#e0e0e0;
    --text-dim:#888;
    --accent:#6c8cff;
    --accent-hover:#8aa4ff;
    --danger:#ff4d4d;
    --danger-hover:#ff6b6b;
    --todo:#ff9f43;
    --doing:#54a0ff;
    --done:#5dd39e;
    --radius:10px;
    --shadow:0 2px 12px rgba(0,0,0,.4);
  }

  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  header{
    text-align:center;
    padding:28px 16px 12px;
  }
  header h1{
    font-size:1.6rem;
    font-weight:700;
    letter-spacing:-.02em;
  }
  header p{
    color:var(--text-dim);
    font-size:.82rem;
    margin-top:4px;
  }

  .board{
    display:flex;
    gap:16px;
    padding:16px 24px 32px;
    flex:1;
    overflow-x:auto;
    justify-content:center;
  }

  .column{
    background:var(--column);
    border:1px solid var(--border);
    border-radius:var(--radius);
    width:320px;
    min-width:280px;
    display:flex;
    flex-direction:column;
    max-height:calc(100vh - 120px);
  }

  .column-header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:16px 16px 12px;
    border-bottom:1px solid var(--border);
    user-select:none;
  }
  .column-dot{
    width:10px;height:10px;border-radius:50%;flex-shrink:0;
  }
  .column[data-id="todo"] .column-dot{background:var(--todo)}
  .column[data-id="doing"] .column-dot{background:var(--doing)}
  .column[data-id="done"] .column-dot{background:var(--done)}

  .column-title{
    font-weight:600;font-size:.95rem;flex:1;
  }
  .column-count{
    background:var(--surface);
    color:var(--text-dim);
    font-size:.72rem;
    font-weight:600;
    padding:2px 8px;
    border-radius:12px;
  }

  .card-list{
    flex:1;
    overflow-y:auto;
    padding:8px;
    display:flex;
    flex-direction:column;
    gap:6px;
    min-height:60px;
  }
  .card-list.drag-over{
    background:rgba(108,140,255,.06);
    border-radius:6px;
  }

  .card{
    background:var(--card);
    border:1px solid transparent;
    border-radius:8px;
    padding:12px 14px;
    cursor:grab;
    transition:background .15s,border-color .15s,box-shadow .15s,transform .15s;
    display:flex;
    align-items:flex-start;
    gap:10px;
    position:relative;
  }
  .card:hover{
    background:var(--card-hover);
    border-color:var(--border);
  }
  .card:active{cursor:grabbing}
  .card.dragging{
    opacity:.4;
    transform:scale(.96);
  }
  .card-text{
    flex:1;
    font-size:.88rem;
    line-height:1.5;
    word-break:break-word;
  }
  .card-delete{
    opacity:0;
    background:none;
    border:none;
    color:var(--danger);
    cursor:pointer;
    font-size:1rem;
    padding:0 2px;
    line-height:1;
    transition:opacity .15s;
    flex-shrink:0;
    margin-top:1px;
  }
  .card:hover .card-delete{opacity:.6}
  .card-delete:hover{opacity:1!important;color:var(--danger-hover)}

  .add-area{
    padding:8px;
    border-top:1px solid var(--border);
  }
  .add-btn{
    width:100%;
    background:none;
    border:1px dashed var(--border);
    border-radius:8px;
    color:var(--text-dim);
    padding:10px;
    cursor:pointer;
    font-size:.84rem;
    transition:background .15s,color .15s,border-color .15s;
  }
  .add-btn:hover{
    background:var(--surface);
    color:var(--text);
    border-color:var(--text-dim);
  }

  .add-form{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .add-form textarea{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    padding:10px 12px;
    font-size:.86rem;
    font-family:inherit;
    resize:none;
    outline:none;
    line-height:1.5;
    min-height:64px;
  }
  .add-form textarea:focus{
    border-color:var(--accent);
  }
  .add-form-actions{
    display:flex;gap:6px;
  }
  .btn-confirm{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:6px;
    padding:7px 16px;
    font-size:.82rem;
    font-weight:600;
    cursor:pointer;
    transition:background .15s;
  }
  .btn-confirm:hover{background:var(--accent-hover)}
  .btn-cancel{
    background:none;
    border:1px solid var(--border);
    border-radius:6px;
    color:var(--text-dim);
    padding:7px 12px;
    font-size:.82rem;
    cursor:pointer;
    transition:background .15s,color .15s;
  }
  .btn-cancel:hover{background:var(--surface);color:var(--text)}

  .drop-indicator{
    height:3px;
    background:var(--accent);
    border-radius:2px;
    margin:2px 4px;
    pointer-events:none;
    transition:opacity .1s;
  }

  /* scrollbar */
  .card-list::-webkit-scrollbar{width:4px}
  .card-list::-webkit-scrollbar-track{background:transparent}
  .card-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

  @media(max-width:960px){
    .board{padding:12px;gap:12px;justify-content:flex-start}
    .column{min-width:260px;width:280px}
  }
</style>
</head>
<body>

<header>
  <h1>📋 칸반 보드</h1>
  <p>카드를 드래그하여 이동 · 자동 저장</p>
</header>

<div class="board" id="board"></div>

<script>
const STORAGE_KEY = 'kanban_v1';

const COLUMNS = [
  { id: 'todo',  title: '할 일' },
  { id: 'doing', title: '진행 중' },
  { id: 'done',  title: '완료' },
];

/* ── State ── */
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return { todo: [], doing: [], done: [] };
}

function saveState() {
  const state = {};
  COLUMNS.forEach(col => {
    const list = document.querySelector(`.column[data-id="${col.id}"] .card-list`);
    state[col.id] = [...list.querySelectorAll('.card')].map(c => ({
      id: c.dataset.cardId,
      text: c.querySelector('.card-text').textContent,
    }));
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  updateCounts();
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

/* ── Render ── */
function createCard(card) {
  const el = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  el.dataset.cardId = card.id;
  el.innerHTML = `
    <span class="card-text">${escapeHtml(card.text)}</span>
    <button class="card-delete" title="삭제" aria-label="삭제">✕</button>
  `;
  el.querySelector('.card-delete').addEventListener('click', () => {
    el.style.transform = 'scale(.9)';
    el.style.opacity = '0';
    setTimeout(() => { el.remove(); saveState(); }, 150);
  });
  setupCardDrag(el);
  return el;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderBoard() {
  const board = document.getElementById('board');
  const state = loadState();

  COLUMNS.forEach(col => {
    const column = document.createElement('div');
    column.className = 'column';
    column.dataset.id = col.id;
    column.innerHTML = `
      <div class="column-header">
        <span class="column-dot"></span>
        <span class="column-title">${col.title}</span>
        <span class="column-count">0</span>
      </div>
      <div class="card-list"></div>
      <div class="add-area">
        <button class="add-btn">+ 카드 추가</button>
      </div>
    `;

    const list = column.querySelector('.card-list');
    (state[col.id] || []).forEach(c => list.appendChild(createCard(c)));

    setupDropZone(list);
    setupAddButton(column);

    board.appendChild(column);
  });

  updateCounts();
}

function updateCounts() {
  document.querySelectorAll('.column').forEach(col => {
    const count = col.querySelectorAll('.card').length;
    col.querySelector('.column-count').textContent = count;
  });
}

/* ── Add Card ── */
function setupAddButton(column) {
  const area = column.querySelector('.add-area');
  const btn = area.querySelector('.add-btn');

  btn.addEventListener('click', () => {
    btn.style.display = 'none';
    const form = document.createElement('div');
    form.className = 'add-form';
    form.innerHTML = `
      <textarea placeholder="카드 내용을 입력하세요…" rows="2"></textarea>
      <div class="add-form-actions">
        <button class="btn-confirm">추가</button>
        <button class="btn-cancel">취소</button>
      </div>
    `;
    area.appendChild(form);

    const textarea = form.querySelector('textarea');
    textarea.focus();

    const close = () => { form.remove(); btn.style.display = ''; };

    const submit = () => {
      const text = textarea.value.trim();
      if (!text) { close(); return; }
      const card = { id: uid(), text };
      column.querySelector('.card-list').appendChild(createCard(card));
      saveState();
      close();
    };

    form.querySelector('.btn-confirm').addEventListener('click', submit);
    form.querySelector('.btn-cancel').addEventListener('click', close);
    textarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
      if (e.key === 'Escape') close();
    });
  });
}

/* ── Drag & Drop ── */
let dragCard = null;
let indicator = null;

function getIndicator() {
  if (!indicator) {
    indicator = document.createElement('div');
    indicator.className = 'drop-indicator';
  }
  return indicator;
}

function removeIndicator() {
  if (indicator && indicator.parentNode) indicator.remove();
}

function setupCardDrag(el) {
  el.addEventListener('dragstart', e => {
    dragCard = el;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
  });
  el.addEventListener('dragend', () => {
    if (dragCard) dragCard.classList.remove('dragging');
    dragCard = null;
    removeIndicator();
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  });
}

function setupDropZone(list) {
  list.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (!dragCard) return;

    list.classList.add('drag-over');
    const cards = [...list.querySelectorAll('.card:not(.dragging)')];
    const ind = getIndicator();

    let placed = false;
    for (const card of cards) {
      const rect = card.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      if (e.clientY < midY) {
        list.insertBefore(ind, card);
        placed = true;
        break;
      }
    }
    if (!placed) {
      list.appendChild(ind);
    }
  });

  list.addEventListener('dragleave', e => {
    if (!list.contains(e.relatedTarget)) {
      list.classList.remove('drag-over');
      removeIndicator();
    }
  });

  list.addEventListener('drop', e => {
    e.preventDefault();
    list.classList.remove('drag-over');

    if (!dragCard) return;
    const ind = getIndicator();
    if (ind.parentNode === list) {
      list.insertBefore(dragCard, ind);
    } else {
      list.appendChild(dragCard);
    }
    removeIndicator();
    dragCard.classList.remove('dragging');
    saveState();
  });
}

/* ── Touch Drag (mobile) ── */
let touchClone = null;
let touchOriginList = null;
let touchOffsetX = 0, touchOffsetY = 0;

document.addEventListener('touchstart', e => {
  const card = e.target.closest('.card');
  if (!card || e.target.closest('.card-delete')) return;

  const touch = e.touches[0];
  const rect = card.getBoundingClientRect();
  touchOffsetX = touch.clientX - rect.left;
  touchOffsetY = touch.clientY - rect.top;

  dragCard = card;
  touchOriginList = card.closest('.card-list');

  touchClone = card.cloneNode(true);
  touchClone.style.cssText = `
    position:fixed;width:${rect.width}px;pointer-events:none;
    z-index:9999;opacity:.85;transform:rotate(2deg);
    left:${rect.left}px;top:${rect.top}px;
  `;
  document.body.appendChild(touchClone);
  card.classList.add('dragging');
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!dragCard || !touchClone) return;
  e.preventDefault();
  const touch = e.touches[0];
  touchClone.style.left = (touch.clientX - touchOffsetX) + 'px';
  touchClone.style.top = (touch.clientY - touchOffsetY) + 'px';

  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  const list = target?.closest('.card-list');

  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  removeIndicator();

  if (list) {
    list.classList.add('drag-over');
    const cards = [...list.querySelectorAll('.card:not(.dragging)')];
    const ind = getIndicator();
    let placed = false;
    for (const c of cards) {
      const r = c.getBoundingClientRect();
      if (touch.clientY < r.top + r.height / 2) {
        list.insertBefore(ind, c);
        placed = true;
        break;
      }
    }
    if (!placed) list.appendChild(ind);
  }
}, { passive: false });

document.addEventListener('touchend', () => {
  if (!dragCard) return;
  if (touchClone) { touchClone.remove(); touchClone = null; }

  const ind = getIndicator();
  if (ind.parentNode) {
    ind.parentNode.insertBefore(dragCard, ind);
  }
  removeIndicator();
  dragCard.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  saveState();
  dragCard = null;
});

/* ── Init ── */
renderBoard();
</script>
</body>
</html>
